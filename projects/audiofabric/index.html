<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dust</title>
  <link rel="stylesheet" href="style.css">
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.168.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.168.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <canvas id="c"></canvas>

  <!-- ── Loading overlay ── -->
  <div id="overlay">
    <canvas id="sand"></canvas>

    <div class="overlay-content">
      <div class="title-block">
        <h1>DUST</h1>
        <div class="title-rule"></div>
        <p class="sub">real-time audio visualizer</p>
      </div>

      <div class="buttons">
        <button id="sysBtn" class="primary">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="2" y="3" width="20" height="14" rx="2"/>
            <path d="M8 21h8M12 17v4"/>
          </svg>
          Capture System Audio
        </button>
        <p class="sys-hint">Share <em>Entire Screen</em> &amp; enable <em>Share system audio</em></p>

        <div class="or"><span>or</span></div>

        <button id="micBtn" class="secondary">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="9" y="2" width="6" height="12" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0M12 19v3M9 22h6"/>
          </svg>
          Microphone
        </button>

        <div class="or"><span>or</span></div>

        <button id="fileBtn" class="secondary">Load Audio File</button>
        <input id="fileInput" type="file" accept="audio/*" hidden>
      </div>

      <p class="hint">drag &amp; drop an audio file anywhere</p>
    </div>
  </div>

  <!-- ── Params panel (top-right) ── -->
  <div id="params">
    <button id="params-toggle">PARAMS</button>
    <div id="params-panel">
      <p class="pp-title">parameters</p>

      <div class="pp-row">
        <div class="pp-label">
          <span>HOTSPOTS</span>
          <div class="pp-label-right">
            <button class="pp-auto" id="auto-hotspots" title="Auto-adjust based on mesh volatility">AUTO</button>
            <span class="pp-val" id="pv-numHotspots">5</span>
          </div>
        </div>
        <input type="range" class="pp-slider" id="ps-numHotspots" min="1" max="10" step="1" value="5">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>WANDER</span><span class="pp-val" id="pv-hotspotSpeed">0.006</span></div>
        <input type="range" class="pp-slider" id="ps-hotspotSpeed" min="0.001" max="0.025" step="0.001" value="0.006">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>RESPONSE</span><span class="pp-val" id="pv-springK">0.045</span></div>
        <input type="range" class="pp-slider" id="ps-springK" min="0.005" max="0.15" step="0.005" value="0.045">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>WAVE SPREAD</span><span class="pp-val" id="pv-neighborK">0.13</span></div>
        <input type="range" class="pp-slider" id="ps-neighborK" min="0.02" max="0.35" step="0.01" value="0.13">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>DECAY</span><span class="pp-val" id="pv-damp">0.91</span></div>
        <input type="range" class="pp-slider" id="ps-damp" min="0.75" max="0.98" step="0.01" value="0.91">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>HEIGHT</span><span class="pp-val" id="pv-hScale">1.6</span></div>
        <input type="range" class="pp-slider" id="ps-hScale" min="0.3" max="4.0" step="0.1" value="1.6">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>SOFTEN</span><span class="pp-val" id="pv-peakCurve">0.50</span></div>
        <input type="range" class="pp-slider" id="ps-peakCurve" min="0.15" max="1.0" step="0.05" value="0.5">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>FALLOFF</span><span class="pp-val" id="pv-rippleFalloff">0.38</span></div>
        <input type="range" class="pp-slider" id="ps-rippleFalloff" min="0.05" max="0.80" step="0.02" value="0.38">
      </div>
      <div class="pp-row">
        <div class="pp-label"><span>GLOW</span><span class="pp-val" id="pv-bloomStrength">0.95</span></div>
        <input type="range" class="pp-slider" id="ps-bloomStrength" min="0.1" max="2.5" step="0.05" value="0.95">
      </div>

      <button id="params-reset">RESET DEFAULTS</button>
    </div>
  </div>

  <div id="corner-hint">drag to orbit &nbsp;&middot;&nbsp; scroll to zoom &nbsp;&middot;&nbsp; drop audio files</div>

  <script type="module" src="sand.js"></script>
  <script type="module" src="visualizer.js"></script>
</body>
</html>
